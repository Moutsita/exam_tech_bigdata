services:
  # 1. Base SOURCE (Touche Personnelle)
  postgres_source:
    image: postgres:17
    container_name: postgres_bookshop
    environment:
      POSTGRES_DB: bookshop
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./init_db:/docker-entrypoint-initdb.d

  # 2. Base de métadonnées Airflow
  postgres_airflow:
    image: postgres:15
    container_name: postgres_airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow

  # 3. Airflow (L'orchestrateur)
  airflow:
    build: .
    container_name: airflow_exam
    depends_on:
      - postgres_airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
    ports:
      - "8080:8080"
    command: standalone

  # 4. Application d'insertion streamlit dans la BD
  admin-app:
      build: .
      container_name: streamlit_admin
      entrypoint: [] # Pour annuler l'entrypoint de airflow
      volumes:
        - ./app_admin:/app
      working_dir: /app
      command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
      ports:
        - "8501:8501"
      depends_on:
        - postgres_source # Pour s'assurer que la DB est lancée avant